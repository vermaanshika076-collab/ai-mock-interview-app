<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Resume</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
body{height:100vh;background:linear-gradient(135deg,#efe9ff,#f6f2ff);display:flex;justify-content:center;align-items:center}
.resume-card{width:480px;background:#ffffff;border-radius:32px;padding:55px 45px;text-align:center;box-shadow:0 40px 80px rgba(125,95,255,0.28)}
.resume-card h1{color:#7b5cff;font-size:34px;font-weight:700}
.resume-card p{color:#888;margin-top:10px;font-size:16px}
.upload-box{margin:45px 0 30px;padding:45px 25px;border:2px dashed #cbbcff;border-radius:24px;background:#faf8ff;cursor:pointer;transition:0.3s}
.upload-box.active{border-color:#7b5cff;background:#f5f3ff}
.upload-box img{width:72px;margin-bottom:18px}
.upload-box h3{color:#7b5cff;font-weight:600;margin-bottom:8px;font-size:18px}
.upload-box span{color:#999;font-size:15px;display:block}
.file-name{color:#7b5cff;font-weight:600;margin-top:10px;font-size:14px}
button{width:100%;padding:18px;border-radius:44px;border:none;background:linear-gradient(135deg,#b792ff,#7b5cff);color:#fff;font-size:18px;font-weight:600;cursor:pointer;margin-top:20px;transition:0.3s}
button:hover{opacity:0.9}
button:disabled{opacity:0.5;cursor:not-allowed}
.footer-text{margin-top:22px;font-size:15px;color:#777}
input[type="file"]{display:none}
.analysis-result{margin-top:20px;padding:20px;background:#f5f3ff;border-radius:16px;text-align:left;display:none}
.analysis-result h4{color:#7b5cff;margin-bottom:10px}
.analysis-result p{color:#666;font-size:14px;margin-bottom:8px}
.start-interview-btn{margin-top:15px;padding:14px;background:#16a34a;color:#fff;border-radius:12px;text-decoration:none;display:inline-block;font-weight:600}
.start-interview-btn:hover{background:#15803d}
.loading{display:none;text-align:center;margin:20px 0}
.spinner{border:3px solid #f3f4f6;border-top-color:#7b5cff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="resume-card">
  <h1>Upload Resume</h1>
  <p>Upload your resume for AI-powered analysis</p>

  <label class="upload-box" id="uploadBox">
    <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" alt="Upload">
    <h3 id="uploadTitle">Click to Upload</h3>
    <span id="uploadSubtitle">PDF or DOCX • Max 5MB</span>
    <span class="file-name" id="fileName" style="display:none"></span>
    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" onchange="handleFileSelect(event)">
  </label>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:10px;color:#7b5cff;font-weight:600">Analyzing resume...</p>
  </div>

  <div class="analysis-result" id="analysisResult">
    <h4>📋 Analysis Complete!</h4>
    <p><strong>Role:</strong> <span id="detectedRole">—</span></p>
    <p><strong>Domain:</strong> <span id="detectedDomain">—</span></p>
    <p><strong>Experience:</strong> <span id="detectedExperience">—</span></p>
    <p><strong>Key Skills:</strong> <span id="detectedSkills">—</span></p>
    <a href="select.html" class="start-interview-btn">Start Interview →</a>
  </div>

  <button id="analyzeBtn" onclick="uploadResume()" disabled>Analyze Resume</button>

  <div class="footer-text">
    Your resume helps us personalize your interview
  </div>
</div>

<script>
const SERVER = "http://localhost:5004";
const userId = localStorage.getItem("userId");

if (!userId) {
  alert("Please login first");
  window.location.href = "login.html";
}

let selectedFile = null;

function handleFileSelect(event) {
  selectedFile = event.target.files[0];
  
  if (selectedFile) {
    const fileSize = selectedFile.size / 1024 / 1024; // MB
    if (fileSize > 5) {
      alert("File too large. Maximum size is 5MB.");
      selectedFile = null;
      return;
    }

    document.getElementById("uploadBox").classList.add("active");
    document.getElementById("fileName").textContent = selectedFile.name;
    document.getElementById("fileName").style.display = "block";
    document.getElementById("uploadTitle").textContent = "File Selected";
    document.getElementById("uploadSubtitle").textContent = "Ready to analyze";
    document.getElementById("analyzeBtn").disabled = false;
  }
}

async function uploadResume() {
  if (!selectedFile) {
    alert("Please select a file first");
    return;
  }

  const formData = new FormData();
  formData.append("resume", selectedFile);
  formData.append("userId", userId);

  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("analyzeBtn").textContent = "Analyzing...";
  document.getElementById("loading").style.display = "block";

  try {
    const res = await fetch(SERVER + "/api/upload-resume", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.error) {
      alert("Upload failed: " + data.error);
      return;
    }

    // Save analysis to localStorage
    const analysis = data.analysis;
    localStorage.setItem("selectedRole", analysis.role);
    localStorage.setItem("selectedDomain", analysis.domain);
    localStorage.setItem("resumeAnalysis", JSON.stringify(analysis));

    // Show results
    document.getElementById("loading").style.display = "none";
    document.getElementById("detectedRole").textContent = analysis.role;
    document.getElementById("detectedDomain").textContent = analysis.domain;
    document.getElementById("detectedExperience").textContent = analysis.experience;
    document.getElementById("detectedSkills").textContent = analysis.skills.join(", ");
    document.getElementById("analysisResult").style.display = "block";

    alert("✅ Resume analyzed successfully! You can now start your interview.");
  } catch (e) {
    console.error("Upload error:", e);
    alert("❌ Upload failed. Make sure backend is running on port 5004.");
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("analyzeBtn").disabled = false;
    document.getElementById("analyzeBtn").textContent = "Analyze Resume";
  }
}
</script>

</body>
</html>
